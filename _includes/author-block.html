<section class="author-block">
  <div class="container author-block__inner">
    <img class="author-block__photo" src="{{ site.author.image | relative_url }}" alt="{{ site.author.name }}">
    <div class="author-block__text">
      <p class="author-block__name">{{ site.author.name }}</p>
      <p>{{ site.author.title }}, {{ site.author.award }}</p>
    </div>
  </div>
</section>
