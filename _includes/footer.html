<footer class="site-footer section-dark">
  <div class="container site-footer__inner">
    <a class="site-footer__logo" href="{{ '/' | relative_url }}" aria-label="{{ site.title | escape }}">
      <img src="{{ site.brand.logo | relative_url }}" alt="АМ">
    </a>

    <nav class="site-footer__nav" aria-label="Навигация в подвале">
      {% for item in site.nav %}
        <a href="{{ item.url }}">{{ item.label }}</a>
      {% endfor %}
    </nav>

    <address class="site-footer__contact">
      <span>{{ site.author.title }} - {{ site.author.full_name }}</span>
      <a href="{{ site.contact.phone_main_href }}">{{ site.contact.phone_main }}</a>
      <a href="{{ site.contact.phone_extra_href }}">{{ site.contact.phone_extra }}</a>
      <a href="{{ site.contact.email_href }}">{{ site.contact.email }}</a>
      <span>{{ site.contact.address }}</span>
    </address>

    {% include socials.html class_name="site-footer__socials" %}
  </div>
</footer>
